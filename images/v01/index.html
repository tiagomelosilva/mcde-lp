<link

  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
/>

<header class="tgmafla-header-wrap" id="tgmaflaHeaderWrap">
  <div class="tgmafla-header-main-bg"></div>
  <div class="tgmafla-header-midline"></div>

  <div class="tgmafla-header-shell">
    <div class="tgmafla-logo-zone">
      <a href="/" class="tgmafla-logo-link" aria-label="Mafla Odontologia">
        <img
          class="tgmafla-logo-img"
          src="https://maflaodontologia.com.br/wp-content/uploads/2026/03/MAFLA-LOGO-01.svg"
          alt="Mafla Odontologia"
        />
      </a>
    </div>

    <button
      class="tgmafla-menu-toggle"
      id="tgmaflaMenuToggle"
      aria-label="Abrir menu"
      aria-expanded="false"
      aria-controls="tgmaflaNavPanel"
      type="button"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav class="tgmafla-nav" id="tgmaflaNavPanel" aria-label="Menu principal">
      <ul class="tgmafla-nav-list">
        <li class="tgmafla-nav-item">
          <a href="#especialidades" class="tgmafla-nav-link">Especialidades</a>
        </li>
        <li class="tgmafla-nav-item">
          <a href="#sobre-nos" class="tgmafla-nav-link">Sobre Nós</a>
        </li>
        <li class="tgmafla-nav-item">
          <a href="#casos-clinicos" class="tgmafla-nav-link">Casos Clínicos</a>
        </li>
        <li class="tgmafla-nav-item">
          <a href="#profissionais" class="tgmafla-nav-link">Profissionais</a>
        </li>
        <li class="tgmafla-nav-item">
          <a href="#contato" class="tgmafla-nav-link">Contato</a>
        </li>
      </ul>

      <a
        href="https://wa.me/5500000000000"
        class="tgmafla-cta-button"
        target="_blank"
        rel="noopener noreferrer"
      >
        <i class="fa-brands fa-whatsapp"></i>
        <span>Agende sua Consulta</span>
      </a>
    </nav>
  </div>
</header>

<style>
  .tgmafla-header-wrap,
  .tgmafla-header-wrap *,
  .tgmafla-header-wrap *::before,
  .tgmafla-header-wrap *::after {
    box-sizing: border-box;
  }

  .tgmafla-header-wrap {
    --tgmafla-header-height: 74px;
    --tgmafla-header-max-width: 1280px;

    --tgmafla-main-bg: rgba(0, 0, 0, 0.33);
    --tgmafla-logo-band-bg: rgba(0, 0, 0, 0.46);
    --tgmafla-midline-bg: rgba(144, 182, 220, 0.14);

    --tgmafla-text-color: rgba(255, 255, 255, 0.92);
    --tgmafla-text-hover: #ffffff;

    --tgmafla-cta-bg: #d7a08f;
    --tgmafla-cta-bg-hover: #c98e7c;

    --tgmafla-mobile-bg: rgba(8, 8, 8, 0.96);

    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    min-height: var(--tgmafla-header-height);
    z-index: 9999;
    isolation: isolate;
    font-family: inherit;
  }

  .tgmafla-header-main-bg {
    position: absolute;
    inset: 0;
    background: var(--tgmafla-main-bg);
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
    z-index: 0;
  }

  .tgmafla-header-midline {
    position: absolute;
    left: 0;
    right: 0;
    top: 50%;
    height: 28px;
    transform: translateY(-50%);
    /* background: var(--tgmafla-midline-bg);
    border-top: 1px solid rgba(255, 255, 255, 0.04);
    border-bottom: 1px solid rgba(255, 255, 255, 0.04); */
    pointer-events: none;
    z-index: 1;
  }

  .tgmafla-header-shell {
    position: relative;
    z-index: 3;
    width: 100%;
    max-width: var(--tgmafla-header-max-width);
    min-height: var(--tgmafla-header-height);
    margin: 0 auto;
    padding: 0 20px;
    display: flex;
    align-items: stretch;
    justify-content: flex-start;
    gap: 0;
  }

  .tgmafla-logo-zone {
    position: relative;
    flex: 0 0 450px;
    min-height: var(--tgmafla-header-height);
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 42px;
    z-index: 4;
  }

  .tgmafla-logo-zone::before {
    content: "";
    position: absolute;
    top: 0;
    bottom: 0;
    left: calc((100vw - var(--tgmafla-header-max-width)) / -2 - 20px);
    right: 0;
    background: var(--tgmafla-logo-band-bg);
    z-index: 0;
    pointer-events: none;
  }

  .tgmafla-logo-link {
    position: relative;
    z-index: 1;
    display: inline-flex;
    align-items: center;
    justify-content: flex-end;
    text-decoration: none;
    line-height: 0;
  }

  .tgmafla-logo-img {
    display: block;
    width: 160px;
    max-width: 100%;
    height: auto;
    filter: brightness(0) invert(1);
  }

  .tgmafla-nav {
    flex: 1 1 auto;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 14px;
    min-width: 0;
    padding-left: 12px;
  }

  .tgmafla-nav-list {
    list-style: none;
    display: flex;
    align-items: center;
    gap: 24px;
    margin: 0;
    padding: 0;
    min-width: 0;
  }

  .tgmafla-nav-item {
    margin: 0;
    padding: 0;
  }

  .tgmafla-nav-link {
    position: relative;
    display: inline-flex;
    align-items: center;
    color: var(--tgmafla-text-color);
    text-decoration: none;
    font-size: 17px;
    font-weight: 400;
    line-height: 1;
    white-space: nowrap;
    transition: color 0.25s ease;
  }

  .tgmafla-nav-link::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -7px;
    width: 0;
    height: 1px;
    background: rgba(255, 255, 255, 0.88);
    transition: width 0.25s ease;
  }

  .tgmafla-nav-link:hover,
  .tgmafla-nav-link:focus {
    color: var(--tgmafla-text-hover);
    outline: none;
  }

  .tgmafla-nav-link:hover::after,
  .tgmafla-nav-link:focus::after {
    width: 100%;
  }

  .tgmafla-cta-button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    min-height: 30px;
    padding: 0 13px;
    margin-left: auto;
    border-radius: 5px;
    background: var(--tgmafla-cta-bg);
    color: #ffffff;
    text-decoration: none;
    white-space: nowrap;
    font-size: 15px;
    font-weight: 400;
    line-height: 1;
    transition: background 0.25s ease, transform 0.2s ease;
  }

  .tgmafla-cta-button i {
    font-size: 14px;
    line-height: 1;
  }

  .tgmafla-cta-button:hover,
  .tgmafla-cta-button:focus {
    background: var(--tgmafla-cta-bg-hover);
    color: #ffffff;
    transform: translateY(-1px);
    outline: none;
  }

  .tgmafla-menu-toggle {
    display: none;
    position: relative;
    z-index: 8;
    width: 46px;
    height: 46px;
    margin: auto 0 auto auto;
    padding: 0;
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.06);
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
  }

  .tgmafla-menu-toggle span {
    position: absolute;
    left: 11px;
    width: 22px;
    height: 2px;
    background: #ffffff;
    border-radius: 999px;
    transition: transform 0.25s ease, opacity 0.25s ease, top 0.25s ease;
  }

  .tgmafla-menu-toggle span:nth-child(1) { top: 14px; }
  .tgmafla-menu-toggle span:nth-child(2) { top: 22px; }
  .tgmafla-menu-toggle span:nth-child(3) { top: 30px; }

  .tgmafla-menu-toggle.tgmafla-is-active span:nth-child(1) {
    top: 22px;
    transform: rotate(45deg);
  }

  .tgmafla-menu-toggle.tgmafla-is-active span:nth-child(2) {
    opacity: 0;
  }

  .tgmafla-menu-toggle.tgmafla-is-active span:nth-child(3) {
    top: 22px;
    transform: rotate(-45deg);
  }

  @media (max-width: 1280px) {
    .tgmafla-header-shell {
      padding: 0 16px;
    }

    .tgmafla-logo-zone {
      flex-basis: 410px;
      padding-right: 34px;
    }

    .tgmafla-logo-zone::before {
      left: calc((100vw - var(--tgmafla-header-max-width)) / -2 - 16px);
    }

    .tgmafla-logo-img {
      width: 152px;
    }

    .tgmafla-nav {
      padding-left: 10px;
      gap: 12px;
    }

    .tgmafla-nav-list {
      gap: 20px;
    }

    .tgmafla-nav-link {
      font-size: 16px;
    }
  }

  @media (max-width: 1140px) {
    .tgmafla-logo-zone {
      flex-basis: 360px;
      padding-right: 26px;
    }

    .tgmafla-logo-img {
      width: 142px;
    }

    .tgmafla-nav {
      padding-left: 10px;
    }

    .tgmafla-nav-list {
      gap: 16px;
    }

    .tgmafla-nav-link {
      font-size: 15px;
    }

    .tgmafla-cta-button {
      font-size: 14px;
      padding: 0 12px;
    }
  }

  @media (max-width: 980px) {
    .tgmafla-header-wrap {
      --tgmafla-header-height: 76px;
    }

    .tgmafla-header-shell {
      padding: 0 14px;
      align-items: center;
      justify-content: space-between;
    }

    .tgmafla-logo-zone {
      flex: 0 0 235px;
      min-height: var(--tgmafla-header-height);
      padding-right: 18px;
    }

    .tgmafla-logo-zone::before {
      left: -14px;
      right: 0;
    }

    .tgmafla-logo-img {
      width: 126px;
    }

    .tgmafla-menu-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .tgmafla-nav {
      position: absolute;
      top: calc(100% + 10px);
      left: 14px;
      right: 14px;
      margin-left: 0;
      padding: 18px;
      border-radius: 16px;
      background: var(--tgmafla-mobile-bg);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 24px 50px rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 18px;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: translateY(-8px);
      transition: opacity 0.25s ease, transform 0.25s ease, visibility 0.25s ease;
    }

    .tgmafla-nav.tgmafla-nav-open {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transform: translateY(0);
    }

    .tgmafla-nav-list {
      flex-direction: column;
      align-items: flex-start;
      gap: 16px;
      width: 100%;
    }

    .tgmafla-nav-item,
    .tgmafla-nav-link {
      width: 100%;
    }

    .tgmafla-nav-link {
      font-size: 17px;
      padding: 4px 0;
    }

    .tgmafla-nav-link::after {
      bottom: -2px;
    }

    .tgmafla-cta-button {
      width: 100%;
      min-height: 48px;
      margin-left: 0;
      font-size: 15px;
    }
  }

  @media (max-width: 640px) {
    .tgmafla-logo-zone {
      flex-basis: 210px;
      padding-right: 14px;
    }

    .tgmafla-logo-img {
      width: 114px;
    }

    .tgmafla-header-midline {
      height: 24px;
    }

    .tgmafla-nav {
      left: 10px;
      right: 10px;
      padding: 16px;
    }
  }
</style>

<script>
  (function () {
    const tgmaflaHeaderWrap = document.getElementById("tgmaflaHeaderWrap");
    const tgmaflaMenuToggle = document.getElementById("tgmaflaMenuToggle");
    const tgmaflaNavPanel = document.getElementById("tgmaflaNavPanel");

    if (!tgmaflaHeaderWrap || !tgmaflaMenuToggle || !tgmaflaNavPanel) return;

    function tgmaflaCloseMenu() {
      tgmaflaNavPanel.classList.remove("tgmafla-nav-open");
      tgmaflaMenuToggle.classList.remove("tgmafla-is-active");
      tgmaflaMenuToggle.setAttribute("aria-expanded", "false");
    }

    function tgmaflaOpenMenu() {
      tgmaflaNavPanel.classList.add("tgmafla-nav-open");
      tgmaflaMenuToggle.classList.add("tgmafla-is-active");
      tgmaflaMenuToggle.setAttribute("aria-expanded", "true");
    }

    tgmaflaMenuToggle.addEventListener("click", function () {
      const isOpen = tgmaflaNavPanel.classList.contains("tgmafla-nav-open");
      isOpen ? tgmaflaCloseMenu() : tgmaflaOpenMenu();
    });

    document.addEventListener("click", function (event) {
      if (!tgmaflaHeaderWrap.contains(event.target)) {
        tgmaflaCloseMenu();
      }
    });

    window.addEventListener("resize", function () {
      if (window.innerWidth > 980) {
        tgmaflaCloseMenu();
      }
    });

    tgmaflaNavPanel.querySelectorAll("a").forEach(function (link) {
      link.addEventListener("click", function () {
        if (window.innerWidth <= 980) {
          tgmaflaCloseMenu();
        }
      });
    });
  })();
</script>
